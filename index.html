<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐贺鑫隆动态日历⭐</title>
    <link rel="stylesheet" href="style.css">
    <style>
       /* 手机端分类标签样式 */
        .mobile-category-tabs {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            gap: 8px;
            margin: 0;
            -webkit-overflow-scrolling: touch; /* 移动端弹性滚动 */
        }
        .mobile-category-tabs .tab {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            color: #fff !important;
            flex-shrink: 0; /* 防止标签被压缩 */
        }
        /* 所有标签背景色（含新增子标签，保持同色系） */
        .mobile-category-tabs .tab[data-target="全部动态"] { background-color: #b088c8; }
        .mobile-category-tabs .tab[data-target="全部动态"].active { background-color: #c9a8d8; }
        /* 舞台子标签（粉色系） */
        .mobile-category-tabs .tab[data-target="其他演出"] { background-color: #ff8fa3; }
        .mobile-category-tabs .tab[data-target="其他演出"].active { background-color: #ffaaaf; }
        .mobile-category-tabs .tab[data-target="颁奖典礼"] { background-color: #ff527b; }
        .mobile-category-tabs .tab[data-target="颁奖典礼"].active { background-color: #ff7391; }
        .mobile-category-tabs .tab[data-target="演唱会"] { background-color: #d63031; }
        .mobile-category-tabs .tab[data-target="演唱会"].active { background-color: #e55a5a; }
        /* 打歌子标签（新增打歌小游戏，保持橙色系） */
        .mobile-category-tabs .tab[data-target="打歌图/碎片"] { background-color: #ff7d00; }
        .mobile-category-tabs .tab[data-target="打歌图/碎片"].active { background-color: #ff9f33; }
        .mobile-category-tabs .tab[data-target="打歌直拍"] { background-color: #ff7d00; }
        .mobile-category-tabs .tab[data-target="打歌直拍"].active { background-color: #ff9f33; }
        .mobile-category-tabs .tab[data-target="打歌小游戏"] { background-color: #ff7d00; }
        .mobile-category-tabs .tab[data-target="打歌小游戏"].active { background-color: #ff9f33; }
        /* 综艺子标签（紫色系） */
        .mobile-category-tabs .tab[data-target="团综"] { background-color: #9575cd; }
        .mobile-category-tabs .tab[data-target="团综"].active { background-color: #a88fd8; }
        .mobile-category-tabs .tab[data-target="外务"] { background-color: #673ab7; }
        .mobile-category-tabs .tab[data-target="外务"].active { background-color: #7e57c2; }
        /* 物料子标签 */
        .mobile-category-tabs .tab[data-target="图片物料"] { background-color: #66bb6a; }
        .mobile-category-tabs .tab[data-target="图片物料"].active { background-color: #8ed191; }
        .mobile-category-tabs .tab[data-target="短物料"] { background-color: #66bb6a; }
        .mobile-category-tabs .tab[data-target="短物料"].active { background-color: #8ed191; }
        .mobile-category-tabs .tab[data-target="长物料"] { background-color: #66bb6a; }
        .mobile-category-tabs .tab[data-target="长物料"].active { background-color: #8ed191; }
        /* cha子标签 */
        .mobile-category-tabs .tab[data-target="队内cha"] { background-color: #A895E7; }
        .mobile-category-tabs .tab[data-target="队内cha"].active { background-color: #A895E7; }
        .mobile-category-tabs .tab[data-target="队外cha"] { background-color: #9370DB; }
        .mobile-category-tabs .tab[data-target="队外cha"].active { background-color: #9370DB; }
        /* 直播子标签（红色系） */
        .mobile-category-tabs .tab[data-target="团体直播"] { background-color: #e57373; }
        .mobile-category-tabs .tab[data-target="团体直播"].active { background-color: #ef9a9a; }
        .mobile-category-tabs .tab[data-target="个人直播"] { background-color: #f44336; }
        .mobile-category-tabs .tab[data-target="个人直播"].active { background-color: #f6685e; }
        .mobile-category-tabs .tab[data-target="多人直播"] { background-color: #d32f2f; }
        .mobile-category-tabs .tab[data-target="多人直播"].active { background-color: #e53935; }
        /* 原有标签 */
        .mobile-category-tabs .tab[data-target="回归日程"] { background-color: #42a5f5; }
        .mobile-category-tabs .tab[data-target="回归日程"].active { background-color: #6fc3f7; }
        .mobile-category-tabs .tab[data-target="猫言猫语"] { background-color: #ab47bc; }
        .mobile-category-tabs .tab[data-target="猫言猫语"].active { background-color: #c26ed3; }
        /* 新增：饲养员日记标签样式（温柔粉色系） */
        .mobile-category-tabs .tab[data-target="饲养员日记"] { background-color: #FFB7C5; }
        .mobile-category-tabs .tab[data-target="饲养员日记"].active { background-color: #FFCCD5; }
        
        /* PC端标签样式（补全新增子标签颜色） */
        .category-tabs .tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff !important;
            display: inline-block;
        }
        .category-tabs .tab[data-target="cha"] { background-color: #A895E7; }
        .category-tabs .tab[data-target="cha"].active { background-color: #A895E7; }
        .category-tabs .tab[data-target="舞台"] { background-color: #ff6b8b; }
        .category-tabs .tab[data-target="舞台"].active { background-color: #ff8fa3; }
        .category-tabs .tab[data-target="综艺"] { background-color: #7e57c2; }
        .category-tabs .tab[data-target="综艺"].active { background-color: #9575cd; }
        .category-tabs .tab[data-target="直播"] { background-color: #ef5350; }
        .category-tabs .tab[data-target="直播"].active { background-color: #e57373; }
        /* 新增：PC端饲养员日记标签样式 */
        .category-tabs .tab[data-target="饲养员日记"] { background-color: #FFB7C5; }
        .category-tabs .tab[data-target="饲养员日记"].active { background-color: #FFCCD5; }

        /* 下拉菜单样式 */
        .dropdown {
            position: relative;
            display: inline-block;
            margin: 0 4px;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #fff;
            min-width: 120px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 100;
            border-radius: 8px;
            overflow: hidden;
        }
        .subtab {
            color: #333 !important;
            padding: 8px 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }
        .subtab:hover {
            background-color: #f0f0f0;
        }
        .subtab.active {
            background-color: #e0e0e0;
            font-weight: bold;
        }
        /* 不同分类子标签激活色 */
        .pc-dropdown[data-target="打歌"] .subtab.active { color: #ff7d00 !important; }
        .pc-dropdown[data-target="物料"] .subtab.active { color: #66bb6a !important; }
        .pc-dropdown[data-target="cha"] .subtab.active { color: #A895E7 !important; }
        .pc-dropdown[data-target="舞台"] .subtab.active { color: #ff6b8b !important; }
        .pc-dropdown[data-target="综艺"] .subtab.active { color: #7e57c2 !important; }
        .pc-dropdown[data-target="直播"] .subtab.active { color: #ef5350 !important; }
        /* 新增：饲养员日记无下拉，无需额外配置 */
        
        .mobile-dropdown .dropdown-content { top: 40px; left: 0; }
        .pc-dropdown .dropdown-content { top: 38px; left: 0; }

        /* 响应式隔离：PC/移动端互不显示 */
        .mobile-category-tabs::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) { 
            .mobile-category-tabs { display: none !important; } 
            .category-date-wrap { display: flex !important; align-items: center; gap: 15px; }
        }
        @media (max-width: 767px) { 
            .category-date-wrap { display: none !important; } 
            .mobile-category-tabs { display: flex !important; }
        }

        /* 统一的搜索框样式（放在分类标签和日历之间，PC/移动端通用） */
        .search-container {
            padding: 10px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            margin: 0 0 10px 0; /* 和日历板块隔开一点 */
        }
        #scheduleSearchInput {
            width: 100%;
            max-width: 400px;
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            box-sizing: border-box;
            display: block;
            margin: 0 auto; /* 居中显示 */
        }
        #scheduleSearchInput:focus {
            border-color: #b088c8;
            box-shadow: 0 0 0 2px rgba(176, 136, 200, 0.2);
        }

        /* 图片预览弹窗样式 */
        #imgPreviewModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #previewImg { max-width: 90%; max-height: 90%; object-fit: contain; cursor: pointer; }
        #imgPreviewModal .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 36px; font-weight: bold; cursor: pointer; user-select: none; }
        #imgPreviewModal .prev-btn { position: absolute; left: 20px; color: #fff; font-size: 48px; font-weight: bold; cursor: pointer; user-select: none; }
        #imgPreviewModal .next-btn { position: absolute; right: 20px; color: #fff; font-size: 48px; font-weight: bold; cursor: pointer; user-select: none; }
        #imgPreviewModal .close-btn:hover, #imgPreviewModal .prev-btn:hover, #imgPreviewModal .next-btn:hover { color: #ccc; }
        
        /* 年份/月份/日期选择器样式统一 */
        #yearSelect, #yearSelect-pc, #monthSelect, #monthSelect-pc, #daySelect, #daySelect-pc {
            padding: 8px 12px !important;
            border: 1px solid #ddd !important;
            border-radius: 8px !important;
            font-size: 14px !important;
            min-width: 90px !important;
            box-sizing: border-box !important;
        }

        /* 行程隐藏类 */
        .event-item.hidden {
            display: none !important;
        }
        .event-card.hidden {
            display: none !important;
        }
    </style>
</head>
<body>

        <div class="date-selector">

    <!-- 移动端分类标签 -->

      <div class="tab" data-target="队外cha">队外cha</div>

    <div class="calendar-nav" style="display: flex !important;">
        <button class="nav-btn" onclick="changeMonth(-1)">&lt;</button>

            <h3 id="eventsDateTitle">2026年3月 · 全部动态</h3>
            <div class="close-events" onclick="closeEventsPanel()">×</div>
        </div>
        <div id="eventsList"></div>

    <script src="script.js"></script>
    <!-- 新增：搜索功能脚本 -->
    <script>
        // 等待页面和script.js加载完成后初始化搜索功能
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 打开页面自动显示当前月份
            const today = new Date();
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth() + 1; // 3月
            
            // 同步年份/月份选择框
            document.getElementById('yearSelect').value = currentYear;
            document.getElementById('yearSelect-pc').value = currentYear;
            document.getElementById('monthSelect').value = currentMonth;
            document.getElementById('monthSelect-pc').value = currentMonth;
            
            // 更新月份标题
            document.querySelector('.month-title').textContent = `${currentYear}年${currentMonth}月`;
            document.getElementById('eventsDateTitle').textContent = `${currentYear}年${currentMonth}月 · 全部动态`;

            // 2. 修复搜索功能：只匹配行程卡片的主文本，不匹配日期和分类标签
            const searchInput = document.getElementById('scheduleSearchInput');
            
            // 实时搜索筛选行程
            searchInput.addEventListener('input', function() {
                // 获取搜索关键词，转小写忽略大小写
                const keyword = this.value.trim().toLowerCase();
                // 只匹配行程卡片的主内容区域，避免匹配到日期或分类标签
                const allEventCards = document.querySelectorAll('.event-card, .event-item');
                
                allEventCards.forEach(card => {
                    // 找到行程卡片的主文本容器（通常是包含标题的那个div）
                    const contentElement = card.querySelector('div:nth-child(2)') || card;
                    const itemText = (contentElement.textContent || contentElement.innerText || '').toLowerCase();
                    
                    // 包含关键词显示，否则隐藏
                    if (keyword === '' || itemText.includes(keyword)) {
                        card.classList.remove('hidden');
                    } else {
                        card.classList.add('hidden');
                    }
                });
            });
        });
    </script>
    <div class="event-list-container" style="margin-top: 20px;"></div>
</body>
